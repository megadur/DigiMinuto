name: Deploy Landing Page and Web App to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'landing_page/**'
      - '.github/workflows/deploy-landing.yml'
      - 'ui_app/**'
      - 'core_engine/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build Web App
        run: |
          cd ui_app
          flutter pub get
          flutter build web --base-href "/app/"
          cp -r build/web ../landing_page/app
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './landing_page'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
